name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project SiteAttendanceLogger.xcodeproj \
            -scheme SiteAttendanceLogger \
            -sdk iphoneos \
            -archivePath ${{ runner.temp }}/SiteAttendanceLogger.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p ${{ runner.temp }}/ipa
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/SiteAttendanceLogger.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SiteAttendanceLogger-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
